# AI Butler — Docker Compose 配置
#
# 目录架构（三层隔离）：
#
#   /app          只读   应用代码 + 依赖（镜像内置，不挂载）
#   /data         读写   持久化数据（记忆、日志、向量库）
#   /workspace    读写   工作区（Agent 命令执行、用户文件）
#
# 使用:
#   Gateway 模式（默认，常驻 HTTP 服务）:
#     docker compose up --build
#
#   CLI 模式（交互终端）:
#     docker compose --profile cli up --build cli
#     docker attach ai-butler-cli
#
#   两者同时运行（CLI + Gateway）:
#     docker compose --profile cli up --build
#     （cli 服务和 gateway 服务共享 /data 数据，对话历史会合并）

services:

  # ── CLI 模式：交互式命令行对话（仅在 --profile cli 时启动）───────────────
  cli:
    build: .
    image: ai-butler-cli:latest
    container_name: ai-butler-cli
    profiles: ["cli"]

    # 交互模式（CLI 需要 tty + stdin）
    stdin_open: true
    tty: true

    # 默认入口即 CLI 模式（python src/ai_butler.py --mode cli）
    command: ["python", "src/ai_butler.py", "--mode", "cli"]

    volumes:
      - ./data:/data
      - ./workspace:/workspace

    env_file:
      - .env

    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

    security_opt:
      - no-new-privileges

  # ── Gateway 模式：默认常驻 HTTP / WebSocket 服务 ───────────────────────────
  # 启用: docker compose up
  gateway:
    build: .
    image: ai-butler-gateway:latest
    container_name: ai-butler-gateway

    command: ["python", "src/ai_butler.py", "--mode", "gateway", "--port", "8080"]

    ports:
      - "8080:8080"

    volumes:
      - ./data:/data
      - ./workspace:/workspace

    env_file:
      - .env

    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

    security_opt:
      - no-new-privileges
