<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 管家</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── 聊天窗口 ── */
    .chat-window {
      width: min(680px, 100%);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: 0 4px 32px rgba(0,0,0,.10);
    }

    /* ── 顶部标题栏 ── */
    .chat-header {
      padding: 16px 20px;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .chat-header .avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .chat-header .title { font-size: 16px; font-weight: 600; }
    .chat-header .subtitle { font-size: 12px; opacity: .6; margin-top: 2px; }
    .chat-header .status {
      margin-left: auto;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
    }
    .chat-header .status.offline { background: #f87171; }

    /* ── 消息列表 ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    /* ── 单条消息气泡 ── */
    .msg {
      display: flex;
      gap: 8px;
      max-width: 85%;
    }
    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg.assistant { align-self: flex-start; }

    .msg .bubble-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .msg.assistant .bubble-avatar {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }
    .msg.user .bubble-avatar {
      background: #e0e7ff;
      color: #4338ca;
    }

    .msg .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.assistant .bubble {
      background: #f3f4f6;
      color: #111827;
      border-bottom-left-radius: 4px;
    }
    .msg.user .bubble {
      background: #4f46e5;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* ── 打字中动画 ── */
    .typing-indicator {
      display: flex; gap: 4px;
      align-items: center;
      padding: 12px 16px;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #9ca3af;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    /* ── 输入区 ── */
    .input-area {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
      flex-shrink: 0;
    }
    .input-area textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      max-height: 140px;
      outline: none;
      transition: border-color .2s;
      overflow-y: auto;
    }
    .input-area textarea:focus { border-color: #4f46e5; }
    .input-area button {
      flex-shrink: 0;
      width: 40px; height: 40px;
      border: none;
      border-radius: 50%;
      background: #4f46e5;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .1s;
    }
    .input-area button:hover { background: #4338ca; }
    .input-area button:active { transform: scale(.92); }
    .input-area button:disabled { background: #c7d2fe; cursor: not-allowed; }
    .input-area button svg { width: 18px; height: 18px; }

    /* ── 欢迎提示 ── */
    .welcome {
      align-self: center;
      text-align: center;
      color: #9ca3af;
      margin: auto;
      padding: 20px;
    }
    .welcome .icon { font-size: 48px; margin-bottom: 12px; }
    .welcome p { font-size: 14px; line-height: 1.8; }

    /* ── 流式输出光标 ── */
    .msg.streaming .bubble::after {
      content: '▋';
      display: inline-block;
      color: #9ca3af;
      animation: blink .7s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── 工具调用卡片 ── */
    .tool-card {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-left: 3px solid #6366f1;   /* 左侧紫色强调条（执行中） */
      border-radius: 8px;
      margin-left: 38px;
      max-width: calc(100% - 54px);
      overflow: hidden;
      cursor: pointer;
      transition: border-color .18s, box-shadow .18s;
      user-select: none;
    }
    .tool-card:hover {
      border-color: #a5b4fc;
      border-left-color: #4f46e5;
      box-shadow: 0 2px 8px rgba(99,102,241,.12);
    }
    /* 完成态：左侧变绿色，背景保持白色（保证文字清晰可读） */
    .tool-card.done {
      border-color: #d1fae5;
      border-left-color: #22c55e;
      background: #fff;
    }
    .tool-card.done:hover {
      border-color: #86efac;
      border-left-color: #16a34a;
      box-shadow: 0 2px 8px rgba(34,197,94,.12);
    }

    /* 卡片头部 */
    .tool-card .tc-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: #374151;
      min-height: 36px;
    }
    .tool-card .tc-name {
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      font-weight: 700;
      color: #4f46e5;
    }
    /* 完成态：函数名用深绿色，对比度 ≥ 4.5:1（白底） */
    .tool-card.done .tc-name { color: #15803d; }
    .tool-card .tc-label { color: #6b7280; font-size: 12px; }
    .tool-card .tc-arrow {
      margin-left: auto;
      font-size: 10px;
      color: #9ca3af;
      transition: transform .2s;
      flex-shrink: 0;
      padding-left: 4px;
    }
    .tool-card.expanded .tc-arrow { transform: rotate(90deg); }

    /* 旋转器 / 完成标记 */
    .tool-card .tc-icon {
      width: 16px; height: 16px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .tc-icon .spinner {
      width: 13px; height: 13px;
      border: 2px solid #d1d5db;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .tc-icon .check {
      display: none;
      font-size: 14px;
      color: #16a34a;
      font-style: normal;
      font-weight: 700;
    }
    .tool-card.done .tc-icon .spinner { display: none; }
    .tool-card.done .tc-icon .check   { display: inline; }

    /* 参数展开区 */
    .tool-card .tc-body {
      display: none;
      border-top: 1px solid #f1f5f9;
      background: #f8fafc;
      padding: 10px 12px;
    }
    .tool-card.done .tc-body {
      border-top-color: #d1fae5;
      background: #f0fdf4;
    }
    .tool-card.expanded .tc-body { display: block; }
    .tc-body .tc-args-title {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .tc-body pre {
      margin: 0;
      font-family: 'SF Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 12px;
      line-height: 1.65;
      color: #1e293b;
      white-space: pre-wrap;
      word-break: break-all;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 8px 10px;
    }
    .tool-card.done .tc-body pre {
      background: #fff;
      border-color: #d1fae5;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 错误横幅 ── */
    .error-banner {
      background: #fef2f2;
      color: #b91c1c;
      font-size: 13px;
      padding: 8px 16px;
      text-align: center;
      display: none;
    }
    .error-banner.show { display: block; }
  </style>
</head>
<body>
<div class="chat-window">
  <!-- 顶部标题栏 -->
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div>
      <div class="title">AI 管家</div>
      <div class="subtitle">随时为您服务</div>
    </div>
    <div class="status offline" id="statusDot" title="连接状态"></div>
  </div>

  <!-- 错误提示 -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- 消息列表 -->
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="icon">✨</div>
      <p>你好！我是你的 AI 管家。<br>有什么我可以帮你的吗？</p>
    </div>
  </div>

  <!-- 输入区 -->
  <div class="input-area">
    <textarea
      id="inputBox"
      placeholder="输入消息，Enter 发送，Shift+Enter 换行…"
      rows="1"
    ></textarea>
    <button id="sendBtn" disabled title="发送">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
  // ── DOM 引用 ─────────────────────────────────────────────────────────────
  const messagesEl  = document.getElementById('messages');
  const inputBox    = document.getElementById('inputBox');
  const sendBtn     = document.getElementById('sendBtn');
  const statusDot   = document.getElementById('statusDot');
  const errorBanner = document.getElementById('errorBanner');

  // ── WebSocket 连接 ────────────────────────────────────────────────────────
  const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/api/ws`;
  let ws = null;
  let isWaiting = false;       // 等待 Butler 回复中
  let welcomeRemoved = false;  // 是否已移除欢迎语
  let streamingBubble = null;  // 当前流式输出的气泡元素

  function connect() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      statusDot.classList.remove('offline');
      statusDot.title = '已连接';
      sendBtn.disabled = false;
      hideError();
    };

    ws.onclose = () => {
      statusDot.classList.add('offline');
      statusDot.title = '已断开';
      sendBtn.disabled = true;
      // 若断开时还在流式输出中，保留气泡内容但移除光标
      finalizeStreamingBubble();
      if (isWaiting) {
        // 工具执行期间断连：提示用户，重置等待状态（不会重复发送）
        isWaiting = false;
        showError('连接中断，正在重连…若无回复请重新发送');
      } else {
        showError('连接已断开，正在重连…');
      }
      setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      showError('WebSocket 连接失败');
    };

    ws.onmessage = (ev) => {
      let frame;
      try {
        frame = JSON.parse(ev.data);
      } catch (e) {
        // 非 JSON 的裸文本（向后兼容）直接追加
        removeTypingIndicator();
        appendStreamToken(ev.data);
        return;
      }

      switch (frame.type) {
        case 'token':
          removeTypingIndicator();
          appendStreamToken(frame.text);
          break;
        case 'tool_call':
          removeTypingIndicator();
          appendToolCard(frame.name, frame.args || {});
          break;
        case 'tool_result':
          finalizeToolCard(frame.name);
          break;
        case 'done':
          finalizeStreamingBubble();
          isWaiting = false;
          sendBtn.disabled = false;
          inputBox.focus();
          break;
        case 'ping':
          // 服务端保活帧，忽略即可
          break;
        case 'error':
          finalizeStreamingBubble();
          appendMessage('assistant', `[错误] ${frame.message}`);
          isWaiting = false;
          sendBtn.disabled = false;
          break;
      }
    };
  }

  connect();

  // ── 消息渲染 ──────────────────────────────────────────────────────────────
  function removeWelcome() {
    if (!welcomeRemoved) {
      const welcome = messagesEl.querySelector('.welcome');
      if (welcome) welcome.remove();
      welcomeRemoved = true;
    }
  }

  /** 新建或追加到流式气泡（逐 token 拼接） */
  function appendStreamToken(token) {
    if (!streamingBubble) {
      removeWelcome();
      const msg = document.createElement('div');
      msg.className = 'msg assistant streaming';
      msg.innerHTML = `
        <div class="bubble-avatar">🤖</div>
        <div class="bubble"></div>
      `;
      messagesEl.appendChild(msg);
      streamingBubble = msg.querySelector('.bubble');
      scrollToBottom();
    }
    // 以纯文本追加（保留换行，防 XSS）
    streamingBubble.appendChild(document.createTextNode(token));
    scrollToBottom();
  }

  /** 流式结束：移除 streaming 标记，清空引用 */
  function finalizeStreamingBubble() {
    if (streamingBubble) {
      streamingBubble.closest('.msg')?.classList.remove('streaming');
      streamingBubble = null;
    }
  }

  // ── 工具调用卡片 ──────────────────────────────────────────────────────────
  // 同一工具可能在一轮对话中被多次调用（如 browser_use 访问多个 URL），
  // 用 FIFO 队列保证 TOOL_CALL / TOOL_RESULT 能按顺序一一对应。
  const _toolCardMap = new Map();  // name → el[]（队列）

  /**
   * 渲染"工具调用中"卡片（可点击展开参数）
   * @param {string} name  工具名称
   * @param {object} args  调用参数（对象）
   */
  function appendToolCard(name, args) {
    removeWelcome();

    // 格式化参数 JSON（无参数时显示占位）
    const hasArgs = args && Object.keys(args).length > 0;
    const argsText = hasArgs
      ? JSON.stringify(args, null, 2)
      : '// 无参数';

    const el = document.createElement('div');
    el.className = 'tool-card';
    el.dataset.tool = name;
    el.innerHTML = `
      <div class="tc-header">
        <div class="tc-icon">
          <div class="spinner"></div>
          <i class="check">✓</i>
        </div>
        <span class="tc-label">调用&nbsp;</span>
        <span class="tc-name">${escapeHtml(name)}</span>
        <span class="tc-label tc-status-text">&nbsp;执行中…</span>
        <span class="tc-arrow">▶</span>
      </div>
      <div class="tc-body">
        <div class="tc-args-title">Parameters</div>
        <pre>${escapeHtml(argsText)}</pre>
      </div>
    `;

    // 点击切换展开/折叠
    el.addEventListener('click', () => el.classList.toggle('expanded'));

    messagesEl.appendChild(el);
    // 入队：同名工具按调用顺序排队
    if (!_toolCardMap.has(name)) _toolCardMap.set(name, []);
    _toolCardMap.get(name).push(el);
    scrollToBottom();
  }

  /** 工具执行完毕：FIFO 出队，将最早的同名卡片切换为"已完成"状态 */
  function finalizeToolCard(name) {
    const queue = _toolCardMap.get(name);
    if (!queue || queue.length === 0) return;
    const el = queue.shift();                   // FIFO：取最早的那张卡
    if (queue.length === 0) _toolCardMap.delete(name);
    el.classList.add('done');
    const statusText = el.querySelector('.tc-status-text');
    if (statusText) statusText.textContent = '\u00a0已完成';
  }

  function appendMessage(role, text) {
    removeWelcome();
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    msg.innerHTML = `
      <div class="bubble-avatar">${role === 'assistant' ? '🤖' : '🙂'}</div>
      <div class="bubble"></div>
    `;
    msg.querySelector('.bubble').textContent = text;
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function appendTypingIndicator() {
    removeWelcome();
    const el = document.createElement('div');
    el.className = 'msg assistant';
    el.id = 'typing';
    el.innerHTML = `
      <div class="bubble-avatar">🤖</div>
      <div class="bubble typing-indicator">
        <span></span><span></span><span></span>
      </div>
    `;
    messagesEl.appendChild(el);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    document.getElementById('typing')?.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── 发送消息 ──────────────────────────────────────────────────────────────
  function sendMessage() {
    const text = inputBox.value.trim();
    if (!text || isWaiting || !ws || ws.readyState !== WebSocket.OPEN) return;

    appendMessage('user', text);
    inputBox.value = '';
    autoResize();
    appendTypingIndicator();  // 等第一个 token 到来前显示打字动画

    ws.send(text);
    isWaiting = true;
    sendBtn.disabled = true;
  }

  sendBtn.addEventListener('click', sendMessage);

  inputBox.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── textarea 自动高度 ─────────────────────────────────────────────────────
  function autoResize() {
    inputBox.style.height = 'auto';
    inputBox.style.height = Math.min(inputBox.scrollHeight, 140) + 'px';
  }
  inputBox.addEventListener('input', autoResize);

  // ── 错误提示 ──────────────────────────────────────────────────────────────
  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.classList.add('show');
  }
  function hideError() {
    errorBanner.classList.remove('show');
  }

  // ── 工具函数 ──────────────────────────────────────────────────────────────
  /** 转义 HTML 特殊字符，防 XSS */
  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
</script>
</body>
</html>
